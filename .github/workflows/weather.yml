name: 🌤 Kyiv Weather Broadcast

on:
  schedule:
    # Кожні 3 години
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  broadcast:
    name: Розіслати прогноз всім підписникам
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Клонувати репозиторій
        uses: actions/checkout@v4

      - name: 🐍 Налаштувати Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Встановити залежності
        run: pip install requests

      - name: 📡 Розіслати погоду підписникам
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GIST_GITHUB_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python weather_broadcast.py
